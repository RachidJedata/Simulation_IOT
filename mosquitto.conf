# Mosquitto MQTT Broker Configuration
# IoT Simulation Platform

listener 1883
protocol mqtt

listener 9001
protocol websockets

# Allow anonymous connections (for local simulation)
allow_anonymous true

# Logging
log_type all
log_dest stdout

# Persistence
persistence true
persistence_location /mosquitto/data/

# Message limits (simulate bandwidth-constrained IoT links)
message_size_limit 65536
max_inflight_messages 20
max_queued_messages 100
